<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://ryljttolhnvyynkfwuju.supabase.co; object-src 'none'; base-uri 'self'; form-action 'self'" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reel Component — Demo</title>
  <link rel="stylesheet" href="styles/reel-component.css" />
  <script>
    // Flags this page as embedded (e.g. inside the homepage slot machine's
    // <iframe>) vs. opened directly as a standalone preview, so the
    // demo-only max-width cap below applies only when standalone.
    if (window.self !== window.top) {
      document.documentElement.classList.add("is-embedded");
    }
  </script>
  <style>
    /* Demo-page-only chrome — not part of the reusable component. */
    * { box-sizing: border-box; }
    html, body {
      /* Defensive: guarantees no scrollbar can ever appear when this page
         is embedded in a tightly-sized <iframe> (the homepage slot
         machine's viewing window). */
      overflow: hidden;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      font-family: system-ui, sans-serif;
    }
    /* The reusable component fills 100% of its container by default (so it
       exactly fills an <iframe> when embedded). Only cap it back down to a
       small centered card when this page is opened directly (standalone) —
       not when embedded, where it must fill its host slot exactly. */
    html:not(.is-embedded) .reel { max-width: clamp(7rem, 6rem + 4vw, 9.5rem); }
  </style>
</head>
<body>

  <!-- =====================================================================
       REUSABLE REEL COMPONENT — copy this whole `.reel` block to duplicate
       a second/third reel later. Only `data-reel` needs to stay unique-ish
       (it doesn't need an id, initReel() finds it via querySelector scoped
       to this element), and the 6 image/name pairs can be swapped freely.
       ===================================================================== -->
  <div class="reel" data-reel>
    <div class="reel__window">
      <div class="reel__track" data-reel-track>

        <article class="reel__card">
          <img class="reel__image" src="https://ik.imagekit.io/mg0v9kccj/IMG_20260707_231943.jpg.jpeg?updatedAt=1783446707944" alt="Dubai" />
          <div class="reel__overlay"></div>
          
        </article>

        <article class="reel__card">
          <img class="reel__image" src="https://ik.imagekit.io/mg0v9kccj/IMG_20260707_231809.jpg.jpeg?updatedAt=1783446708209" alt="Goa" />
          <div class="reel__overlay"></div>
          
        </article>

        <article class="reel__card">
          <img class="reel__image" src="https://ik.imagekit.io/mg0v9kccj/IMG_20260703_170724.jpg.jpeg?updatedAt=1783078705945" alt="Vietnam" />
          <div class="reel__overlay"></div>
          
        </article>

        <article class="reel__card">
          <img class="reel__image" src="https://ik.imagekit.io/mg0v9kccj/IMG_20260703_132014.jpg.jpeg?updatedAt=1783065390185" alt="Singapore" />
          <div class="reel__overlay"></div>
          
        </article>

        <article class="reel__card">
          <img class="reel__image" src="https://ik.imagekit.io/mg0v9kccj/IMG_20260703_131131.jpg.jpeg?updatedAt=1783064570925" alt="Japan" />
          <div class="reel__overlay"></div>
          
        </article>

        <article class="reel__card">
          <img class="reel__image" src="https://ik.imagekit.io/mg0v9kccj/IMG_20260703_125532.jpg.jpeg?updatedAt=1783064185950" alt="Iceland" />
          <div class="reel__overlay"></div>
          
        </article>

      </div>
    </div>
  </div>

  <script src="js/reel-component.js" defer></script>
</body>
</html>
